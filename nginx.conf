server {
    listen ${PORT};
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (CSP se omite a propósito: requiere afinado por los estilos
    # inline de Angular y la llamada cross-origin a la API; se deja para una pasada
    # dedicada y testeada para no romper prod).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
